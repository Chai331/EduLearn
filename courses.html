    .modal-overlay {
      display:none; position:fixed; inset:0;

      align-items:center; justify-content:center; padding:1rem;
    }
    .modal-overlay.open { display:flex; }
    .modal-box {
      background:#fff; border-radius:20px;
      width:100%; max-width:720px; max-height:90vh;
      overflow:hidden; display:flex; flex-direction:column;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
      animation:slideUp 0.25s ease;
    }
    @keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-hero {
      height:150px; display:flex; align-items:center; justify-content:center;
      position:relative; flex-shrink:0;
    }
    .modal-hero-icon { font-size:2.8rem; color:rgba(255,255,255,0.75); }
    .modal-close {
      position:absolute; top:12px; right:14px;
      background:rgba(255,255,255,0.2); border:none; border-radius:50%;
      width:34px; height:34px; color:#fff; font-size:1rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.2s;
    }
    .modal-close:hover { background:rgba(255,255,255,0.4); }
    /* Tab row */
    .modal-tab-row {
      display:flex; background:#f9fafb; border-bottom:2px solid #e5e7eb;
      flex-shrink:0; overflow-x:auto;
    }
    .modal-tab-btn {
      padding:0.75rem 1.4rem; border:none; background:transparent;
      font-family:'Inter',sans-serif; font-size:0.85rem; font-weight:600;
      color:#6b7280; cursor:pointer; white-space:nowrap;
      border-bottom:3px solid transparent; margin-bottom:-2px;
      transition:all 0.2s;
    }
    .modal-tab-btn:hover { color:#667eea; }
    .modal-tab-btn.active { color:#667eea; border-bottom-color:#667eea; background:#fff; }
    /* Modal body */
    .modal-body { padding:1.5rem; overflow-y:auto; flex:1; }
    /* Lecture files */
    .lecture-file {
      display:flex; align-items:center; gap:0.9rem;
      padding:0.75rem 1rem; border-radius:10px; border:1.5px solid #e5e7eb;
      margin-bottom:0.6rem; transition:all 0.2s; background:#fff;
    }
    .lecture-file:hover { border-color:#667eea; background:#f8f9ff; }
    .file-icon {
      width:40px; height:40px; border-radius:10px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:1rem;
    }
    .file-icon.pdf { background:#fee2e2; color:#ef4444; }
    .file-icon.video { background:#dbeafe; color:#3b82f6; }
    .file-meta { flex:1; }
    .file-title { font-weight:600; color:#1a1a2e; font-size:0.88rem; }
    .file-sub { font-size:0.75rem; color:#9ca3af; margin-top:2px; }
    .file-dl-btn {
      background:linear-gradient(135deg,#667eea,#764ba2); color:#fff;
      border:none; padding:0.4rem 0.9rem; border-radius:8px;
      font-size:0.78rem; font-weight:700; cursor:pointer; white-space:nowrap;
      font-family:'Inter',sans-serif; transition:opacity 0.2s;
    }
    .file-dl-btn:hover { opacity:0.85; }
    /* Lock overlay for unenrolled */
    .locked-notice {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:2.5rem 1rem; text-align:center;
    }
    .locked-icon { font-size:2.5rem; color:#d1d5db; margin-bottom:0.8rem; }
    /* Quiz */
    .quiz-question { margin-bottom:1.4rem; }
    .quiz-q-text { font-weight:700; color:#1a1a2e; font-size:0.9rem; margin-bottom:0.6rem; }
    .quiz-option {
      display:flex; align-items:center; gap:8px;
      padding:0.55rem 0.9rem; border:1.5px solid #e5e7eb;
      border-radius:8px; margin-bottom:0.35rem; cursor:pointer;
      font-size:0.85rem; color:#374151; transition:all 0.15s;
    }
    .quiz-option:hover { border-color:#667eea; background:#f8f9ff; }
    .quiz-option input[type=radio] { accent-color:#667eea; }
    .quiz-option.correct { border-color:#10b981; background:#d1fae5; color:#065f46; }
    .quiz-option.wrong   { border-color:#ef4444; background:#fee2e2; color:#991b1b; }
    /* Toast */
    .toast {
      position:fixed; bottom:24px; right:24px; z-index:9999;
      background:#1a1a2e; color:#fff; padding:0.8rem 1.2rem;
      border-radius:12px; font-size:0.85rem; font-weight:600;

    .enrolled-badge {

      text-transform:uppercase; letter-spacing:0.5px;
    }

</head>

        { week:2,  title:'Software Development Life Cycle',        type:'pdf',   size:'1.2 MB', file:'Software Engineering/Lectures/lecture2.pdf' },
        { week:3,  title:'Software Processes and Activities',       type:'pdf',   size:'1.2 MB', file:'Software Engineering/Lectures/lecture3.pdf' },
        { week:4,  title:'Project Management and Risk',            type:'pdf',   size:'1.2 MB', file:'Software Engineering/Lectures/lecture4.pdf' },
        { week:5,  title:'Requirements Engineering',               type:'pdf',   size:'1.1 MB', file:'Software Engineering/Lectures/lecture5.pdf' }
      ],
      quiz: [
        { q:'What is software engineering primarily concerned with?', opts:['Hardware design','Cost-effective high-quality software','Networking','Data storage'], ans:1 },
        { q:'SDLC stands for:', opts:['System Design Life Cycle','Software Development Life Cycle','Software Design Logic Cycle','None'], ans:1 },
        { q:'First SDLC phase is:', opts:['Testing','Planning','Coding','Maintenance'], ans:1 },
        { q:'Waterfall model is:', opts:['Iterative','Linear','Random','Agile'], ans:1 },
        { q:'Software process consists of:', opts:['Random acts','Structured activities','Hardware process','None'], ans:1 },
        { q:'Risk management first step is:', opts:['Planning','Monitoring','Identification','Analysis'], ans:2 },
        { q:'Functional requirements mainly describe:', opts:['System constraints','System services','UI design','Algorithms'], ans:1 },
        { q:'Validation checks if software meets:', opts:['Speed needs','Customer needs','UI needs','Memory needs'], ans:1 },
        { q:'Which strategy reduces risk probability?', opts:['Contingency','Avoidance','Monitoring','Reporting'], ans:1 },
        { q:'Software project management ensures delivery on:', opts:['One day','Time/Budget/Requirements','Fast speed','UI color'], ans:1 }
      ]
    }
  };

  /* ── State ── */
  var currentFilter = 'all';
  var currentCourse = null;
  var quizAnswers   = [];

  /* ── Filter ── */
  function setFilter(btn, cat) {
    document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    currentFilter = cat;
    renderCourses();
  }

  /* ── Render cards ── */
  function renderCourses() {
    var grid    = document.getElementById('courseGrid');
    var q       = document.getElementById('searchInput').value.toLowerCase();
    var enr     = EduDB.getUserEnrollments(__sess.id);
    var enrIds  = enr.map(function(e){ return e.courseId; });
    var enrolledCount = enrIds.length;

    var notice = document.getElementById('enrolledCount');
    notice.textContent = enrolledCount > 0
      ? '✅ You are enrolled in ' + enrolledCount + ' course' + (enrolledCount>1?'s':'')+'. Click "Continue Learning" to access lectures and quiz.'
      : 'Click "View Course" to preview, then enrol to unlock lecture files and quizzes.';

    var filtered = COURSES.filter(function(c){
      var catOk = currentFilter==='all' || c.cat===currentFilter;
      var qOk   = !q || c.title.toLowerCase().includes(q) || c.tag.toLowerCase().includes(q);
      return catOk && qOk;
    });

    grid.innerHTML = '';
    if (filtered.length === 0) {
      grid.innerHTML = '<p style="text-align:center;color:#9ca3af;grid-column:1/-1;padding:2rem;">No courses found.</p>';
      return;
    }

    filtered.forEach(function(c) {
      var isEnrolled = enrIds.includes(c.id);
      var enrollment = enr.find(function(e){ return e.courseId === c.id; });
      var pct        = enrollment ? enrollment.progress : 0;

      var div = document.createElement('div');
      div.style.cssText = 'background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 6px 25px rgba(0,0,0,0.1);display:flex;flex-direction:column;position:relative;transition:transform 0.25s,box-shadow 0.25s;';
      div.onmouseover = function(){ this.style.transform='translateY(-5px)'; this.style.boxShadow='0 14px 40px rgba(0,0,0,0.18)'; };
      div.onmouseout  = function(){ this.style.transform=''; this.style.boxShadow='0 6px 25px rgba(0,0,0,0.1)'; };

      div.innerHTML =
        '<div style="height:150px;'+c.color+';display:flex;align-items:center;justify-content:center;position:relative;">' +
          (isEnrolled ? '<span class="enrolled-badge"><i class="fas fa-check-circle"></i> Enrolled</span>' : '') +
          '<i class="fas '+c.icon+'" style="font-size:3rem;color:rgba(255,255,255,0.65);"></i>' +
        '</div>' +
        '<div style="padding:1.2rem;flex:1;display:flex;flex-direction:column;">' +
          '<span style="display:inline-block;background:#f0f2ff;color:#667eea;font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;margin-bottom:0.6rem;text-transform:uppercase;letter-spacing:0.5px;">'+c.tag+'</span>' +
          '<div style="font-size:0.97rem;font-weight:700;color:#1a1a2e;margin-bottom:0.4rem;line-height:1.4;">'+c.title+'</div>' +
          '<div style="font-size:0.78rem;color:#6b7280;margin-bottom:0.8rem;flex:1;">'+c.desc.slice(0,90)+'…</div>' +
          '<div style="display:flex;gap:1rem;font-size:0.75rem;color:#9ca3af;margin-bottom:0.9rem;">' +
            '<span><i class="fas fa-clock"></i> '+c.weeks+' weeks</span>' +
            '<span><i class="fas fa-signal"></i> '+c.level+'</span>' +
            '<span><i class="fas fa-file-alt"></i> '+CONTENT[c.id].lectures.length+' lectures</span>' +
          '</div>' +
          (isEnrolled
            ? '<div style="margin-bottom:0.7rem;">' +
                '<div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:3px;"><span style="color:#374151;font-weight:600;">Progress</span><span style="color:#667eea;font-weight:700;">'+pct+'%</span></div>' +
                '<div style="background:#f3f4f6;border-radius:10px;height:6px;overflow:hidden;">' +
                  '<div style="height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:10px;width:'+pct+'%;"></div>' +
                '</div></div>'
            : '') +
          '<button onclick="openModal(\''+c.id+'\')" style="width:100%;border:none;padding:0.65rem;border-radius:8px;font-family:Inter,sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;transition:opacity 0.2s;' +
            (isEnrolled
              ? 'background:linear-gradient(135deg,#43e97b,#38f9d7);color:#065f46;'
              : 'background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;') +
            '" onmouseover="this.style.opacity=\'0.85\'" onmouseout="this.style.opacity=\'1\'">' +
            (isEnrolled
              ? '<i class="fas fa-play-circle"></i> Continue Learning'
              : '<i class="fas fa-eye"></i> View Course') +
          '</button>' +
        '</div>';

      grid.appendChild(div);
    });
  }

  /* ── Open modal ── */
  function openModal(courseId) {
    currentCourse = COURSES.find(function(c){ return c.id === courseId; });
    var enr       = EduDB.getUserEnrollments(__sess.id);
    var isEnrolled= enr.some(function(e){ return e.courseId === courseId; });
    quizAnswers   = new Array(CONTENT[courseId].quiz.length).fill(null);

    /* Hero */
    document.getElementById('modalHero').style.background = currentCourse.color;
    document.getElementById('modalHeroIcon').className    = 'fas ' + currentCourse.icon + ' modal-hero-icon';

    /* Tabs visibility */
    document.getElementById('modalTabs').style.display = isEnrolled ? 'flex' : 'none';
    switchTab('overview'); // always start on overview

    /* Overview content */
    var outcomesList = currentCourse.outcomes.map(function(o){ return '<li style="padding:0.3rem 0;font-size:0.85rem;color:#374151;display:flex;align-items:flex-start;gap:8px;"><i class="fas fa-check-circle" style="color:#10b981;margin-top:2px;flex-shrink:0;"></i>'+o+'</li>'; }).join('');
    document.getElementById('modalBody').innerHTML =
      '<h2 style="font-size:1.3rem;font-weight:800;color:#1a1a2e;margin-bottom:0.3rem;">'+currentCourse.title+'</h2>' +
      '<div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;">' +
        '<span style="font-size:0.78rem;color:#667eea;font-weight:600;"><i class="fas fa-calendar"></i> '+currentCourse.weeks+' Weeks</span>' +
        '<span style="font-size:0.78rem;color:#667eea;font-weight:600;"><i class="fas fa-signal"></i> '+currentCourse.level+'</span>' +
        '<span style="font-size:0.78rem;color:#667eea;font-weight:600;"><i class="fas fa-file-alt"></i> '+CONTENT[courseId].lectures.length+' Lectures</span>' +
        '<span style="font-size:0.78rem;color:#667eea;font-weight:600;"><i class="fas fa-question-circle"></i> '+CONTENT[courseId].quiz.length+' Quiz Questions</span>' +
      '</div>' +
      '<p style="font-size:0.88rem;color:#4b5563;line-height:1.7;margin-bottom:1.2rem;">'+currentCourse.desc+'</p>' +
      '<h4 style="font-size:0.88rem;font-weight:800;color:#1a1a2e;margin-bottom:0.6rem;">What You\'ll Learn</h4>' +
      '<ul style="list-style:none;margin-bottom:1.5rem;">'+outcomesList+'</ul>' +
      (!isEnrolled
        ? '<button onclick="doEnrol(\''+courseId+'\')" id="enrolBtn" style="width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:0.85rem;border-radius:10px;font-family:Inter,sans-serif;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 4px 15px rgba(102,126,234,0.4);transition:transform 0.2s;" onmouseover="this.style.transform=\'translateY(-2px)\'" onmouseout="this.style.transform=\'\'"><i class="fas fa-user-plus"></i> Enrol Now – Free</button>'
        : '<div style="background:#d1fae5;border-radius:10px;padding:0.8rem 1rem;font-size:0.85rem;color:#065f46;font-weight:600;text-align:center;"><i class="fas fa-check-circle"></i> You are enrolled – use the tabs above to access Lectures and Quiz</div>');

    /* Lectures */
    var lectures  = CONTENT[courseId].lectures;
    var lHtml     = '';
    lectures.forEach(function(l) {
      lHtml +=
        '<div class="lecture-file">' +
          '<div class="file-icon '+l.type+'"><i class="fas '+(l.type==='pdf'?'fa-file-pdf':'fa-play-circle')+'"></i></div>' +
          '<div class="file-meta">' +
            '<div class="file-title">Week '+l.week+': '+l.title+'</div>' +
            '<div class="file-sub">'+(l.type==='pdf'?'PDF Document':'Video Lecture')+' &nbsp;·&nbsp; '+l.size+'</div>' +
          '</div>' +
          '<button class="file-dl-btn" onclick="openFile(\''+l.file+'\', '+l.week+', \''+l.title+'\')">' +
            (l.type==='pdf'?'<i class="fas fa-eye"></i> View':'<i class="fas fa-play"></i> Watch') +
          '</button>' +
        '</div>';
    });
    document.getElementById('lectureList').innerHTML = lHtml;

    /* Quiz */
    var quiz   = CONTENT[courseId].quiz;
    var qHtml  = '';
    quiz.forEach(function(q, i) {
      qHtml += '<div class="quiz-question" id="qq'+i+'">' +
        '<div class="quiz-q-text">'+(i+1)+'. '+q.q+'</div>';
      q.opts.forEach(function(opt, j) {
        qHtml += '<label class="quiz-option" id="qo'+i+'_'+j+'">' +
          '<input type="radio" name="quiz'+i+'" value="'+j+'" onchange="quizAnswers['+i+']='+j+'" /> '+opt+'</label>';
      });
      qHtml += '</div>';
    });
    document.getElementById('quizList').innerHTML   = qHtml;
    document.getElementById('quizResult').style.display = 'none';
    document.getElementById('quizSubmitBtn').style.display = 'block';
    var btn = document.getElementById('quizSubmitBtn');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane"></i> Submit Quiz';

    document.getElementById('courseModal').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  /* ── Switch modal tab ── */
  function switchTab(name) {
    ['overview','lectures','quiz'].forEach(function(t) {
      document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = t===name?'block':'none';
    });
    document.querySelectorAll('.modal-tab-btn').forEach(function(b,i) {
      b.classList.toggle('active', ['overview','lectures','quiz'][i]===name);
    });
    if (name==='quiz') { quizAnswers = quizAnswers.map(function(){ return null; }); }
  }

  /* ── Enrol ── */
  function doEnrol(courseId) {
    var c   = COURSES.find(function(x){ return x.id===courseId; });
    var btn = document.getElementById('enrolBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Enrolling…';
    setTimeout(function() {
      EduDB.enrol(__sess.id, courseId, c.title, c.icon, c.color);
      showToast('✅ Enrolled in "'+c.title+'"! Lecture files and Quiz are now unlocked.');
      closeModal();
      renderCourses();
    }, 800);
  }

  /* ── Submit quiz ── */
  function submitQuiz() {
    var quiz = CONTENT[currentCourse.id].quiz;
    var score = 0;
    var allAnswered = true;
    quiz.forEach(function(q, i) {
      if (quizAnswers[i] === null) { allAnswered = false; return; }
      if (quizAnswers[i] === q.ans) score++;
      /* Colour options */
      q.opts.forEach(function(_, j) {
        var el = document.getElementById('qo'+i+'_'+j);
        if (el) {
          el.classList.remove('correct','wrong');
          if (j === q.ans) el.classList.add('correct');
          else if (j === quizAnswers[i] && quizAnswers[i] !== q.ans) el.classList.add('wrong');
        }
      });
    });
    if (!allAnswered) { showToast('⚠️ Please answer all questions first.'); return; }
    var pct   = Math.round(score / quiz.length * 100);
    var pass  = pct >= 60;
    var res   = document.getElementById('quizResult');
    res.style.display = 'block';
    res.className = pass ? 'alert-success' : 'alert-error';
    res.innerHTML = (pass ? '<i class="fas fa-trophy"></i>' : '<i class="fas fa-redo"></i>') +
      ' Score: <strong>'+score+'/'+quiz.length+' ('+pct+'%)</strong> – ' +
      (pass ? 'Excellent! You passed the quiz 🎉' : 'Keep studying and try again 💪');
    if (pass) {
      EduDB.markQuizDone(__sess.id, currentCourse.id, score, quiz.length);
    }
    var btn = document.getElementById('quizSubmitBtn');
    btn.style.display = 'none';
  }

  /* ── Close modal ── */
  function closeModal() {
    document.getElementById('courseModal').classList.remove('open');
    document.body.style.overflow = '';
    currentCourse = null;
  }
  function closeModalOnBg(e) { if (e.target === document.getElementById('courseModal')) closeModal(); }

  /* ── Open file ── */
  function openFile(path, week, title) {
    if (path) {
      window.open(path, '_blank');
      if (week && title && currentCourse) {
        EduDB.markLectureRead(__sess.id, currentCourse.id, week, title);
      }
    } else {
      showToast('📁 File path not found.');
    }
  }

  /* ── Demo download ── */
  function demoDownload() { showToast('📁 Demo mode: In a live deployment this file would download.'); }

  /* ── Toast ── */
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.style.display = 'block';
    setTimeout(function(){ t.style.display='none'; }, 3500);
  }
</script>
</body>
</html>
