<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookstore - EduHub</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .bookstore-container {
            padding: 40px 20px;
            background: var(--light-color);
            min-height: calc(100vh - 70px);
        }

        .bookstore-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .bookstore-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .search-bar {
            max-width: 500px;
            margin: 30px auto;
            display: flex;
            gap: 10px;
        }

        .search-bar input {
            flex: 1;
            padding: 12px;
            border: 2px solid var(--primary-color);
            border-radius: 5px;
            font-size: 1rem;
        }

        .search-bar button {
            padding: 12px 25px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .book-card {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
        }

        .book-cover {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
        }

        .book-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .book-info h3 {
            color: var(--primary-color);
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        .book-info p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .book-author {
            font-style: italic;
            color: #999;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .book-price {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .add-to-cart-btn {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .add-to-cart-btn:hover {
            background: #0b7dda;
        }

        .cart-icon {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--primary-color);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 100;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close {
            float: right;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
        }

        .close:hover {
            color: var(--dark-color);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }

        .cart-total {
            text-align: right;
            font-size: 1.2rem;
            font-weight: bold;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid var(--primary-color);
        }

        .checkout-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1rem;
        }

        @media (max-width: 768px) {
            .cart-icon {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>🎓 EduHub</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="courses.html" class="nav-link">Courses</a></li>
                <li><a href="forum.html" class="nav-link">Forum</a></li>
                <li><a href="bookstore.html" class="nav-link active">Bookstore</a></li>
                <li><a href="portal.html" class="nav-link">Portal</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Bookstore Section -->
    <div class="bookstore-container">
        <div class="container">
            <div class="bookstore-header">
                <h1>📚 Academic Bookstore</h1>
                <p>Find and purchase academic books for your courses</p>
            </div>

            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search books by title or author...">
                <button onclick="searchBooks()">Search</button>
            </div>

            <div class="books-grid" id="booksGrid">
                <!-- Books will be generated by JavaScript -->
            </div>
        </div>
    </div>

    <!-- Shopping Cart Modal -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeCart()">&times;</span>
            <h2>🛒 Shopping Cart</h2>
            <div id="cartItems"></div>
            <div class="cart-total">
                Total: <span id="cartTotal">$0.00</span>
            </div>
            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        </div>
    </div>

    <!-- Cart Icon -->
    <div class="cart-icon" onclick="openCart()">
        🛒
        <span class="cart-badge" id="cartBadge">0</span>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>About EduHub</h4>
                    <p>Your comprehensive learning and bookstore platform.</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 EduHub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        const books = [
            { id: 1, title: 'Calculus: Early Transcendentals', author: 'Stewart, James', price: 89.99, emoji: '📐' },
            { id: 2, title: 'Introduction to Chemistry', author: 'Brown, LeMay', price: 75.50, emoji: '🧪' },
            { id: 3, title: 'Molecular Biology of the Gene', author: 'Watson, James', price: 99.99, emoji: '🧬' },
            { id: 4, title: 'Web Design with HTML & CSS', author: 'Robbins, Jennifer', price: 45.99, emoji: '💻' },
            { id: 5, title: 'The Great Gatsby', author: 'Fitzgerald, F. Scott', price: 15.99, emoji: '📖' },
            { id: 6, title: 'World History: A Comprehensive View', author: 'Spielvogel, Jackson', price: 129.99, emoji: '🌍' },
            { id: 7, title: 'Physics for Scientists and Engineers', author: 'Serway, Jewett', price: 119.99, emoji: '⚛️' },
            { id: 8, title: 'Organic Chemistry Reactions', author: 'Klein, David', price: 85.00, emoji: '⚗️' },
        ];

        let cart = [];

        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = books.map(book => `
                <div class="book-card">
                    <div class="book-cover">${book.emoji}</div>
                    <div class="book-info">
                        <h3>${book.title}</h3>
                        <p class="book-author">by ${book.author}</p>
                        <div class="book-price">$${book.price}</div>
                        <button class="add-to-cart-btn" onclick="addToCart(${book.id})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(bookId) {
            const book = books.find(b => b.id === bookId);
            const existingItem = cart.find(item => item.id === bookId);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...book, quantity: 1 });
            }
            
            updateCartBadge();
            alert(book.title + ' added to cart!');
        }

        function updateCartBadge() {
            document.getElementById('cartBadge').textContent = cart.length;
        }

        function openCart() {
            document.getElementById('cartModal').style.display = 'block';
            renderCart();
        }

        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        function renderCart() {
            const cartItems = document.getElementById('cartItems');
            if (cart.length === 0) {
                cartItems.innerHTML = '<p>Your cart is empty</p>';
                document.getElementById('cartTotal').textContent = '$0.00';
                return;
            }

            cartItems.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <div>
                        <strong>${item.title}</strong>
                        <p>Qty: ${item.quantity}</p>
                    </div>
                    <div>
                        <strong>$${(item.price * item.quantity).toFixed(2)}</strong>
                        <button onclick="removeFromCart(${item.id})" style="margin-left: 10px; background: #ff6b6b; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Remove</button>
                    </div>
                </div>
            `).join('');

            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
        }

        function removeFromCart(bookId) {
            cart = cart.filter(item => item.id !== bookId);
            updateCartBadge();
            renderCart();
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Your cart is empty');
                return;
            }
            alert('Proceeding to checkout. Thank you for your purchase!');
            cart = [];
            updateCartBadge();
            closeCart();
        }

        function searchBooks() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = books.filter(book => 
                book.title.toLowerCase().includes(query) || 
                book.author.toLowerCase().includes(query)
            );
            
            const grid = document.getElementById('booksGrid');
            if (filtered.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No books found</p>';
                return;
            }

            grid.innerHTML = filtered.map(book => `
                <div class="book-card">
                    <div class="book-cover">${book.emoji}</div>
                    <div class="book-info">
                        <h3>${book.title}</h3>
                        <p class="book-author">by ${book.author}</p>
                        <div class="book-price">$${book.price}</div>
                        <button class="add-to-cart-btn" onclick="addToCart(${book.id})">Add to Cart</button>
                    </div>
                </div>
            `).join('');
        }

        window.onclick = function(event) {
            let modal = document.getElementById('cartModal');
            if (event.target == modal) closeCart();
        }

        // Initial render
        renderBooks();
    </script>
</body>
</html>
